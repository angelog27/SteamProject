<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="stylesheet.css">
<title>Leaderboard</title>
</head>
<body>
	<header>
		<img src="../images/LOGO.png" width="100" height="100" alt="Logo"/>
		<nav>
		  <ul class="Nav_Menu">
			  <li><a href="index.html">Home</a></li>
			  <li><a href="profile.html">Profile</a></li>
			  <li><a href="leaderboard.html">Leaderboard</a></li>
		  </ul>
		</nav>
	</header>
	<div class="Wrapper">
		<div>
			<h1>Leaderboard - Highest Streaks</h1>
			<div id="leaderboardDisplay"></div>
		</div>
	</div>

	<script>
		loadLeaderboard();

		async function loadLeaderboard() {
			try {
				const response = await fetch('http://localhost:5000/api/leaderboard');
				const data = await response.json();
				
				if (response.ok && data.length > 0) {
					let html = '<table style="width: 100%; margin-top: 20px;"><tr><th>Rank</th><th>Username</th><th>Longest Streak</th><th>Current Streak</th></tr>';
					
					data.forEach((user, index) => {
						html += `<tr>
							<td>${index + 1}</td>
							<td>${user.username}</td>
							<td>${user.longest_streak} days</td>
							<td>${user.current_streak} days</td>
						</tr>`;
					});
					
					html += '</table>';
					document.getElementById('leaderboardDisplay').innerHTML = html;
				} else {
					document.getElementById('leaderboardDisplay').innerHTML = '<p>No users on leaderboard yet</p>';
				}
			} catch (error) {
				document.getElementById('leaderboardDisplay').innerHTML = '<p>Error loading leaderboard</p>';
			}
		}
	</script>
</body>
</html>
